name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  node:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install node binding dependencies
        working-directory: bindings/node
        run: npm ci
      - name: Build node package
        run: npm --workspace bindings/node run build
      - name: Node smoke
        run: node -e "const n=require('./bindings/node/index.js'); console.log(n.e2ESmoke())"

  python:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: python -m pip install maturin
      - name: Build Python wheel
        working-directory: bindings/python
        run: python -m maturin build
      - name: Install Python wheel
        working-directory: bindings/python
        run: python -m pip install (Get-ChildItem target/wheels/*.whl | Select-Object -First 1).FullName
      - name: Python CLI help
        working-directory: bindings/python
        run: python -m nextral --help
