services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nextral
      POSTGRES_USER: nextral
      POSTGRES_PASSWORD: nextral
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/nextraldev
    ports:
      - "7474:7474"
      - "7687:7687"
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nextral
      MINIO_ROOT_PASSWORD: nextraldev
    ports:
      - "9000:9000"
      - "9001:9001"
